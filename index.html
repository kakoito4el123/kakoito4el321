<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Game Launcher</title>
<style>
         /* Прячем чат по умолчанию */
            #chat-window {
                display: none; 
            }
        :root {
            --bg-gradient: linear-gradient(-45deg, #0f0c1b, #16102b, #0b192c, #080811);
            --sidebar-bg: rgba(15, 15, 25, 0.4);
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-glow: rgba(59, 130, 246, 0.15);
            --btn-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }

        body.light-theme {
            --bg-gradient: linear-gradient(-45deg, #f0f2f5, #e2e8f0, #dbeafe, #edf2f7);
            --sidebar-bg: rgba(255, 255, 255, 0.6);
            --text-color: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.06);
            --accent-glow: rgba(59, 130, 246, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: background 0.5s ease, color 0.3s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Кастомный красивый скроллбар для внутренних блоков, чтобы не было дефолтных белых полос */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        body.light-theme ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
            justify-content: space-between;
            z-index: 10;
        }

        .logo-area h2 {
            margin: 0;
            text-align: center;
            padding: 10px 0 30px 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: linear-gradient(45deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.25s ease;
        }

        .nav-btn:hover {
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .nav-btn.active {
            color: var(--text-color);
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, rgba(148, 85, 247, 0.1) 100%);
            border-left: 3px solid #3b82f6;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .bottom-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .theme-btn, .action-btn {
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-color);
        }

        .theme-btn:hover { background: #3b82f6; color: white; }
        .action-btn { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .action-btn:hover { background: #ef4444; color: white; }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            overflow: hidden; /* Фикс: запрещаем скролл всей панели контента, скроллиться будут только внутренние списки */
        }

        .page-panel { 
            animation: fadeIn 0.4s ease-out;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .welcome-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .core-btn {
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .core-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

        /* ЭЛЕМЕНТЫ ИНТЕРФЕЙСА ЗАМЕТОК */
        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .todo-input {
            flex-grow: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 12px;
            outline: none;
        }
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .todo-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--card-border);
            padding: 14px 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        body.light-theme .todo-item { background: rgba(0,0,0,0.02); }
        
        .todo-delete-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .todo-delete-btn:hover { background: rgba(239, 68, 68, 0.1); }

        /* РАНДОМ И ТАЙМЕР СТИЛИ */
        .random-display { font-size: 72px; font-weight: 800; color: #3b82f6; margin: 20px 0; text-shadow: 0 0 30px rgba(59, 130, 246, 0.4); }
        .timer-display { font-size: 64px; font-weight: 700; font-family: monospace; color: #10b981; margin: 20px 0; }
        .timer-input { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-color); padding: 10px; font-size: 20px; border-radius: 10px; width: 80px; text-align: center; margin-bottom: 15px; }

        /* ИГРОТЕКА И КАТАЛОГ ИГР */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; overflow-y: auto; }
        .game-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s, box-shadow 0.2s; }
        .game-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .game-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .game-icon { font-size: 32px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; }
        .game-title { font-size: 18px; font-weight: 700; margin: 0; color: var(--text-color); }
        .game-genre { font-size: 12px; color: #3b82f6; background: rgba(59, 130, 246, 0.1); padding: 2px 8px; border-radius: 12px; display: inline-block; }
        .game-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; flex-grow: 1; }
        .game-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; border-top: 1px solid var(--card-border); padding-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* --- СТИЛИ ДЛЯ ВКЛАДКИ ПРОФИЛЯ --- */
        .profile-container { display: flex; gap: 30px; align-items: center; margin-bottom: 30px; }
        .profile-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            display: flex; justify-content: center; align-items: center;
            font-size: 42px; box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
        }
        .profile-details h2 { margin: 0 0 5px 0; font-size: 26px; }
        .profile-badge { background: rgba(59, 130, 246, 0.15); color: #3b82f6; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .info-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--card-border); font-size: 15px; }
        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 600; }

        /* --- ИСПРАВЛЕННЫЕ СТИЛИ ДЛЯ ДВУХПАНЕЛЬНОГО ЧАТА --- */
        .chat-container-block { 
            display: flex;
            flex-grow: 1;
            height: 100%;
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            border-radius: 24px; 
            overflow: hidden;
            box-sizing: border-box;
        }
        
        .chat-sidebar { 
            width: 250px; 
            border-right: 1px solid var(--card-border); 
            display: flex; 
            flex-direction: column;
            background: rgba(0,0,0,0.1); 
        }
        
        .sidebar-header { 
            padding: 15px; 
            border-bottom: 1px solid var(--card-border);
        }
        
        .friends-list { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            gap: 8px; 
        }
        
        .friend-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 10px;
            border-radius: 12px; 
            cursor: pointer; 
            transition: background 0.2s; 
        }
        .friend-item:hover { background: rgba(255,255,255,0.05); }
        .friend-status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
        
        .chat-main-area { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            background: transparent;
            position: relative;
        }
        
        .chat-history { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            gap: 12px; 
            box-sizing: border-box;
        }
        
        .chat-message { 
            display: flex; 
            flex-direction: column; 
            max-width: 70%;
            padding: 10px 14px; 
            border-radius: 14px; 
            font-size: 14px; 
            line-height: 1.4; 
            position: relative;
            box-sizing: border-box;
        }
        .chat-message.my-msg { 
            align-self: flex-end; 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
            color: white;
            border-bottom-right-radius: 2px; 
        }
        .chat-message.other-msg { 
            align-self: flex-start; 
            background: rgba(255,255,255,0.05); 
            color: var(--text-color); 
            border-bottom-left-radius: 2px;
            border: 1px solid var(--card-border); 
        }
        
        .msg-meta { font-size: 11px; opacity: 0.7; font-weight: bold; margin-bottom: 3px; }
        .msg-time { font-size: 10px; align-self: flex-end; margin-top: 5px; opacity: 0.6; }
        .chat-img-preview { max-width: 200px; border-radius: 8px; margin-top: 5px; }

        .chat-input-panel {
            padding: 15px 20px;
            border-top: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
        }

        /* Стиль для размытия чата у неавторизованных гостей */
        .chat-blur-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 12, 27, 0.8); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; gap: 15px; text-align: center;
        }
   
</style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <h2>NEXT-GEN HUB</h2>
        </div>
        
        <div class="nav-links">
            <button class="nav-btn active" onclick="switchTab(this, 'main')">🏠 Главная</button>
            <button class="nav-btn" onclick="switchTab(this, 'random')">🎲 Рандом</button>
            <button class="nav-btn" onclick="switchTab(this, 'todo')">📝 Заметки</button>
            <button class="nav-btn" onclick="switchTab(this, 'timer')">⏰ Таймер</button>
            <button class="nav-btn" onclick="switchTab(this, 'games')">🎮 Игротека</button>
            <button class="nav-btn" onclick="switchTab(this, 'profile')">👤 Профиль</button>
            <button class="nav-btn" onclick="switchTab(this, 'chat')">💬 Чат</button>
        </div>

        <div class="bottom-area">
            <button class="theme-btn" id="theme-toggle-btn" onclick="toggleTheme()">🌙 Тёмная тема</button>
            <button class="action-btn" onclick="exitLauncher()">✖ Выйти</button>
        </div>
    </div>

    <div class="main-content" id="content-area">
        <div class="page-panel" id="page-main">
            <div class="welcome-card">
                <h1 style="margin:0 0 15px 0; font-size:36px;">ГЛАВНОЕ МЕНЮ</h1>
                <p>Добро пожаловать в твою новую экосистему. Весь бэкэнд работает на Python, а интерфейс обрабатывается видеокартой для максимальной плавности.</p>
            </div>
        </div>
        
    </div>
    

    <script>
                // 2. Вызывай её только ОДИН РАЗ при инициализации
        document.addEventListener("DOMContentLoaded", () => {
            loadFriendsList(); 
        });
        let countdownInterval = null;

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle-btn');
            body.classList.toggle('light-theme');
            btn.innerHTML = body.classList.contains('light-theme') ? "☀️ Светлая тема" : "🌙 Тёмная тема";
        }

        function switchTab(buttonElement, pageId) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            const contentArea = document.getElementById('content-area');
            if (countdownInterval) clearInterval(countdownInterval);

            if (pageId === 'main') {
                contentArea.innerHTML = `
                    <div class="page-panel">
                        <div class="welcome-card">
                            <h1 style="margin:0 0 15px 0; font-size:36px;">ГЛАВНОЕ МЕНЮ</h1>
                            <p>Добро пожаловать в твою новую экосистему. Весь бэкэнд работает на Python, а интерфейс обрабатывается видеокартой для максимальной плавности.</p>
                        </div>
                    </div>`;
            } 
            else if (pageId === 'random') {
                contentArea.innerHTML = `
                    <div class="page-panel">
                        <h1 style="margin:0 0 10px 0;">🎲 РАНДОМАЙЗЕР</h1>
                        <p style="color:var(--text-muted);">Генератор случайных чисел напрямую из Python</p>
                        <div class="welcome-card" style="text-align: center; max-width: 400px; margin-top:20px;">
                            <div class="random-display" id="random-number-result">?</div>
                            <button class="core-btn" onclick="runRandomizer()">Сгенерировать</button>
                        </div>
                    </div>`;
            }
            else if (pageId === 'todo') {
                contentArea.innerHTML = `
                    <div class="page-panel">
                        <h1 style="margin:0 0 10px 0;">📝 МОИ ЗАМЕТКИ</h1>
                        <p style="color:var(--text-muted); margin-bottom: 20px;">Список задач с синхронизацией в локальную базу данных SQLite</p>
                        <div class="welcome-card" style="max-width: 550px;">
                            <div class="todo-input-group">
                                <input type="text" id="todo-text-input" class="todo-input" placeholder="Напишите задачу...">
                                <button class="core-btn" onclick="addTodoItem()">Добавить</button>
                            </div>
                            <div class="todo-list" id="todo-tasks-container">
                                <p style="color: var(--text-muted);">Загрузка заметок из базы...</p>
                            </div>
                        </div>
                    </div>`;
                // Сразу подгружаем текущие заметки из базы данных!
                loadTodoTasks();
            }
            else if (pageId === 'timer') {
                contentArea.innerHTML = `
                    <div class="page-panel">
                        <h1 style="margin:0 0 10px 0;">⏰ НАДЕЖНЫЙ ТАЙМЕР</h1>
                        <p style="color:var(--text-muted);">Укажите время в секундах для обратного отсчета</p>
                        <div class="welcome-card" style="text-align: center; max-width: 400px; margin-top:20px;">
                            <input type="number" id="timer-seconds-input" class="timer-input" value="10">
                            <div class="timer-display" id="timer-clock">00</div>
                            <div style="display:flex; gap:10px; justify-content:center;">
                                <button class="core-btn" style="background:linear-gradient(135deg, #10b981 0%, #059669 100%);" id="timer-start-btn" onclick="startUiTimer()">СТАРТ</button>
                                <button class="core-btn" style="background:linear-gradient(135deg, #ef4444 0%, #dc2626 100%);" onclick="stopUiTimer()">СТОП</button>
                            </div>
                        </div>
                    </div>`;
            }
                else if (pageId === 'games') {
                        contentArea.innerHTML = `
                            <div class="page-panel">
                                <h1 style="margin:0 0 10px 0;">🎮 ИГРОТЕКА</h1>
                                <p style="color:var(--text-muted); margin-bottom: 20px;">Каталог твоих независимых проектов и симуляторов</p>
                                <div class="games-grid" id="games-market-container">
                                    <p style="color:var(--text-muted);">Загрузка доступных игр...</p>
                                </div>
                            </div>`;
                        loadGamesCatalog();
            }
            else if (pageId === 'profile') {
                contentArea.innerHTML = `
                    <div class="page-panel">
                        <h1>ЛИЧНЫЙ КАБИНЕТ</h1>
                        <div class="subtitle">Твой игровой аккаунт и статистика</div>
                        <div class="profile-card" style="background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 30px; max-width: 600px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);">
                            <div class="profile-container" style="display: flex; gap: 25px; align-items: center; margin-bottom: 25px;">
                                <div class="profile-avatar" style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%); display: flex; justify-content: center; align-items: center; font-size: 36px;">👤</div>
                                <div class="profile-details">
                                    <h2 id="profile-nick" style="margin:0 0 5px 0;">Загрузка...</h2>
                                    <div class="profile-badge" style="background: rgba(59, 130, 246, 0.15); color: #3b82f6; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block;">Пользователь</div>
                                </div>
                            </div>
                            <div class="info-table" style="display: flex; flex-direction: column; margin-bottom: 25px; gap: 12px;">
                                <div class="info-row" style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--card-border);">
                                    <span style="color: var(--text-muted);">Номер телефона</span>
                                    <span id="profile-phone">Загрузка...</span>
                                </div>
                                <div class="info-row" style="display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--card-border);">
                                    <span style="color: var(--text-muted);">Статус синхронизации</span>
                                    <span style="color: #10b981; font-weight: 600;">Локальная БД (ОК)</span>
                                </div>
                            </div>
                            <div id="profile-auth-actions">
                                </div>
                        </div>
                    </div>`;

                if (window.pywebview && window.pywebview.api) {
                    window.pywebview.api.get_user_profile_data().then(function(profile) {
                        document.getElementById('profile-nick').innerText = profile.nickname;
                        document.getElementById('profile-phone').innerText = profile.phone || "Нет сессии";
                        
                        const actionsDiv = document.getElementById('profile-auth-actions');
                        if (profile.nickname === "Авторизуйтесь" || profile.status === "Гость") {
                            actionsDiv.innerHTML = `<button class="core-btn" style="width: 100%; padding: 14px; font-weight: 600;" onclick="window.pywebview.api.open_native_auth()">🔐 Войти / Зарегистрироваться</button>`;
                        } else {
                            actionsDiv.innerHTML = `<button class="core-btn" style="width: 100%; padding: 14px; font-weight: 600; background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2);" onclick="window.pywebview.api.logout_user().then(() => location.reload())">❌ Выйти из аккаунта</button>`;
                        }
                    });
                }
            }
            else if (pageId === 'chat') {
                contentArea.innerHTML = `
                    <div class="page-panel">
                        <div class="chat-container-block">
                            <div class="chat-sidebar">
                                <div class="sidebar-header">
                                    <input type="text" id="friend-phone-input" class="todo-input" style="font-size:12px; padding:8px;" placeholder="Поиск по телефону +7...">

        // Таймер
        function startUiTimer() {
            if (countdownInterval) return;
            const input = document.getElementById('timer-seconds-input');
            const clock = document.getElementById('timer-clock');
            const startBtn = document.getElementById('timer-start-btn');
            let seconds = parseInt(input.value);
            if (isNaN(seconds) || seconds <= 0) return;
            input.disabled = true; startBtn.disabled = true; startBtn.style.opacity = 0.5;
            clock.style.color = "#ef4444"; clock.innerText = seconds;
            countdownInterval = setInterval(() => {
                seconds--;
                if (seconds >= 0) clock.innerText = seconds;
                else { stopUiTimer(); alert("Время! Таймер завершен!"); }
            }, 1000);
        }

        function stopUiTimer() {
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            const input = document.getElementById('timer-seconds-input');
            const clock = document.getElementById('timer-clock');
            const startBtn = document.getElementById('timer-start-btn');
            if (input) input.disabled = false;
            if (startBtn) { startBtn.disabled = false; startBtn.style.opacity = 1; }
            if (clock) { clock.innerText = "00"; clock.style.color = "#10b981"; }
        }

        function formatLastSeen(ts) {
            if (!ts) return 'был(а) давно';
            const now = Date.now()/1000;
            const diff = Math.floor(now - ts);
            if (diff < 5) return 'в сети';
            const mins = Math.floor(diff/60);
            if (mins < 2) return 'был(а) только что';
            if (mins < 5) return 'был(а) 2 мин. назад';
            if (mins < 15) return `был(а) ${mins} мин. назад`;
            if (mins < 60) return 'был(а) менее часа назад';
            const hours = Math.floor(mins/60);
            if (hours < 24) return hours === 1 ? 'был(а) более часа назад' : `был(а) ${hours} ч. назад`;
            return 'был(а) давно';
        }

            const reader = new FileReader();

                const dataUrl = e.target.result; // data:image/png;base64,...
                if (window.pywebview && window.pywebview.api) {

            };
            reader.readAsDataURL(file);

            const img = document.createElement('img'); img.src = src; img.style.maxWidth='90%'; img.style.maxHeight='90%'; img.style.borderRadius='8px'; img.style.boxShadow='0 20px 50px rgba(0,0,0,0.5)'; img.style.transform = 'scale(1)'; img.dataset.scale = 1;

        }

        function loadGamesCatalog() {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.get_games_list().then(function(games) {
                    const container = document.getElementById('games-market-container');
                    if (!container) return;
                    container.innerHTML = '';

                    if (games.length === 0) {
                        container.innerHTML = '<p style="color:var(--text-muted);">В базе данных пока нет доступных игр.</p>';
                        return;
                    }

                    games.forEach(game => {
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        card.innerHTML = `
                            <div class="game-header">
                                <div class="game-icon">${game.icon || '🎮'}</div>
                                <button class="core-btn" onclick="runGame('${game.id}')">Запустить</button>
                            </div>
                            <div>
                                <h3 class="game-title">${game.title}</h3>
                                <span class="game-genre">${game.genre}</span>
                            </div>
                            <p class="game-desc">${game.description || 'Нет описания.'}</p>
                            <div class="game-meta">
                                <span>Релиз: ${game.release_date}</span>
                                <span>Релизёр: ${game.publisher}</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                });
            }
        }

        function runGame(gameId) {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.launch_game_by_id(gameId).then(function(res) {
                    if (res.status === 'error') {
                        alert("Ошибка запуска: " + res.message);
                    }
                });
            }
        }

        

        function toggleAuthForms(target) {
            if(target === 'reg') {
                document.getElementById('auth-login-form').style.display = 'none';
                document.getElementById('auth-reg-form').style.display = 'flex';
            } else {
                document.getElementById('auth-login-form').style.display = 'flex';
                document.getElementById('auth-reg-form').style.display = 'none';
            }
        }

        function submitLogin() {
            const u = document.getElementById('auth-username').value.trim();
            const p = document.getElementById('auth-password').value.strip ? document.getElementById('auth-password').value.strip() : document.getElementById('auth-password').value;
            if(!u || !p) { alert("Заполните все поля!"); return; }

            window.pywebview.api.login_launcher_user(u, p).then(function(res) {
                alert(res.message);
                if(res.status === 'success') {
                    switchTab('profile'); // Перерисовываем личный кабинет
                }
            });
        }

        function submitRegister() {
            const u = document.getElementById('reg-username').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const p = document.getElementById('reg-password').value;
            if(!u || !phone || !p) { alert("Заполните все поля!"); return; }

            window.pywebview.api.register_launcher_user(u, phone, p).then(function(res) {
                alert(res.message);
                if(res.status === 'success') {
                    toggleAuthForms('login');
                }
            });
        }

        function logoutUserSession() {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.logout_launcher_user().then(function(res) {
                    if(res.status === 'success') {
                        alert("Вы вышли из системы!");
                        switchTab('profile'); // Мгновенно переключает на форму логина без перезапуска!
                    }
                });
            }
        }


    </script>
</body>
</html>
